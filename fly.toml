app = "blog-generate"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  SHOPIFY_APP_URL = "https://blog-generate.fly.dev"

[deploy]
  release_command = "npm run setup"

[processes]
  web = "npm run start"
  cron = "node scripts/cron-runner.mjs"

[http_service]
  processes = ["web"]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  processes = ["web"]
  size = "shared-cpu-1x"
  memory = "512mb"

[[vm]]
  processes = ["cron"]
  size = "shared-cpu-1x"
  memory = "256mb"
